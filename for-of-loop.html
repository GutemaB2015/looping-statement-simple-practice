<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For-of Loop</title>
</head>
<body>
    <h2 id="forof"></h2>
    <script>
    const carts = ['laptop', 'mouse', 'keyboard', 'desktop'];
    const displayarea = document.getElementById('forof');
        for (const cart of carts){
        displayarea.innerHTML += cart + "<br>";
    }
    </script>
</body>
</html>
