        <!-- Challenge 4: Printing even number only 1-n (Using for-loop and if statement) -->

    <input type="number" id="userinput" placeholder="Enter the number">
<button id="btn">Print Even Number</button>
<h3 id="printarea"></h3>
<script>
    const button = document.getElementById('btn');
    const printarea = document.getElementById('printarea');
    button.addEventListener('click', () => {
        let number = Number(document.getElementById('userinput').value);
        printarea.innerHTML = "";
        for (let i = 1; i <= number; i++) {
        if (i % 2 === 0) {
        printarea.innerHTML += i + "<br>";
            }
        }
    });
</script>
